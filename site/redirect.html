<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Leaving Smol…</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <main
            style="
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 1.5rem;
            "
        >
            <div class="warning-box">
                <p class="warning-label">You're leaving Smol</p>
                <div class="warning-dest" id="dest"></div>

                <div class="countdown-ring">
                    <svg viewBox="0 0 56 56" width="56" height="56">
                        <circle
                            class="countdown-track"
                            cx="28"
                            cy="28"
                            r="23"
                        />
                        <circle
                            class="countdown-fill"
                            id="fill"
                            cx="28"
                            cy="28"
                            r="23"
                            stroke-dasharray="144.5"
                            stroke-dashoffset="0"
                        />
                    </svg>
                    <span class="countdown-number" id="num">5</span>
                </div>

                <div class="warning-actions">
                    <a class="btn-cancel" href="/">Cancel</a>
                    <button class="btn-go" onclick="go()">Go now</button>
                </div>
            </div>
        </main>

        <script>
            const params = new URLSearchParams(window.location.search);
            const DEST = params.get("dest");

            if (!DEST) window.location.href = "/";

            const display = DEST.length > 70 ? DEST.slice(0, 70) + "…" : DEST;
            document.getElementById("dest").textContent = display;

            const CIRC = 144.5;
            const fill = document.getElementById("fill");
            const num = document.getElementById("num");
            let remaining = 5;

            const timer = setInterval(() => {
                remaining--;
                num.textContent = remaining;
                fill.style.strokeDashoffset = CIRC * (1 - remaining / 5);
                if (remaining <= 0) {
                    clearInterval(timer);
                    go();
                }
            }, 1000);

            function go() {
                clearInterval(timer);
                window.location.href = DEST;
            }
        </script>
    </body>
</html>
