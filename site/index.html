<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Smol — URL Shortener</title>
        <link rel="stylesheet" href="style.css" />
        <script src="script.js" defer></script>
    </head>
    <body>
        <main>
            <header>
                <h1>Smol</h1>
                <p class="tagline">Make your URLs smaller</p>
            </header>

            <div class="card">
                <div class="input-row">
                    <input
                        type="url"
                        id="urlInput"
                        placeholder="https://your-very-long-url.com/goes/here"
                        autocomplete="off"
                        spellcheck="false"
                    />
                    <button id="shortenBtn">Shorten</button>
                </div>

                <div class="alias-row">
                    <span class="alias-base">smol.vercel.app/</span>
                    <input
                        type="text"
                        id="slugInput"
                        placeholder="custom-alias (optional)"
                        maxlength="50"
                        autocomplete="off"
                        spellcheck="false"
                    />
                </div>

                <div id="status" class="status"></div>
            </div>
        </main>

        <!-- Exit warning overlay -->
        <div class="overlay" id="overlay">
            <div class="warning-box">
                <p class="warning-label">You're leaving Smol</p>
                <div class="warning-dest" id="warningDest"></div>

                <div class="countdown-ring">
                    <svg viewBox="0 0 56 56" width="56" height="56">
                        <circle
                            class="countdown-track"
                            cx="28"
                            cy="28"
                            r="23"
                        />
                        <circle
                            class="countdown-fill"
                            id="countdownCircle"
                            cx="28"
                            cy="28"
                            r="23"
                            stroke-dasharray="144.5"
                            stroke-dashoffset="0"
                        />
                    </svg>
                    <span class="countdown-number" id="countdownNumber">5</span>
                </div>

                <div class="warning-actions">
                    <button class="btn-cancel" id="cancelBtn">Cancel</button>
                    <button class="btn-go" id="goBtn">Go now</button>
                </div>
            </div>
        </div>
    </body>
</html>
